{{/*
Daily retention CronJob — prunes Umami's `website_event`, `event_data`,
and orphaned `session` rows older than retention.days.

Per spec-analytics-module §10.4. Default 13 months (395 days) — operators
typically want a year-over-year comparison + a month of buffer.

Umami v3 schema: events live in `website_event` (not v1's `event`), and
`event_data` joins via `website_event_id`. Sessions are pruned only once
they have no remaining events.

The job runs psql against gatewaze_umami with the `gatewaze_umami_role`
credentials provisioned by job-bootstrap-db.yaml. ON_ERROR_STOP so a
prune failure surfaces in the CronJob's status.
*/}}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "gatewaze-analytics.fullname" . }}-retention
  labels:
    {{- include "gatewaze-analytics.labels" . | nindent 4 }}
    component: retention
spec:
  schedule: {{ .Values.retention.schedule | quote }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        metadata:
          labels:
            {{- include "gatewaze-analytics.selectorLabels" . | nindent 12 }}
            component: retention
        spec:
          restartPolicy: OnFailure
          containers:
            - name: prune
              image: postgres:16-alpine
              env:
                - name: UMAMI_DSN
                  valueFrom:
                    secretKeyRef:
                      name: {{ .Values.database.umamiDsnSecretRef.name }}
                      key: {{ .Values.database.umamiDsnSecretRef.key }}
                - name: RETENTION_DAYS
                  value: {{ .Values.retention.days | quote }}
              command:
                - /bin/sh
                - -ec
                # The cutoff is computed IN Postgres (now() - interval) —
                # postgres:16-alpine's BusyBox `date` supports neither GNU
                # "N days ago" nor BSD -v syntax, so any shell-side cutoff
                # silently comes up empty and ON_ERROR_STOP kills the run.
                - |
                  case "$RETENTION_DAYS" in (*[!0-9]*|'') echo "invalid RETENTION_DAYS: $RETENTION_DAYS" >&2; exit 1;; esac
                  echo "[analytics:retention] pruning rows older than ${RETENTION_DAYS} days"
                  psql "$UMAMI_DSN" -v ON_ERROR_STOP=1 -tAc \
                    "DELETE FROM event_data
                       WHERE website_event_id IN (
                         SELECT event_id FROM website_event
                          WHERE created_at < now() - interval '${RETENTION_DAYS} days'
                       )"
                  psql "$UMAMI_DSN" -v ON_ERROR_STOP=1 -tAc \
                    "DELETE FROM session_data WHERE created_at < now() - interval '${RETENTION_DAYS} days'"
                  psql "$UMAMI_DSN" -v ON_ERROR_STOP=1 -tAc \
                    "DELETE FROM website_event WHERE created_at < now() - interval '${RETENTION_DAYS} days'"
                  psql "$UMAMI_DSN" -v ON_ERROR_STOP=1 -tAc \
                    "DELETE FROM session s
                       WHERE s.created_at < now() - interval '${RETENTION_DAYS} days'
                         AND NOT EXISTS (
                           SELECT 1 FROM website_event we WHERE we.session_id = s.session_id
                         )"
                  echo "[analytics:retention] complete"

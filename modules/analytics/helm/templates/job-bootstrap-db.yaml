{{/*
Pre-install Job — runs ONCE before the Umami Deployment starts.

Per spec-analytics-module §10.1 hard rule 4: NO Supabase CLI. The bootstrap
runs raw SQL against the existing platform Postgres using the operator's
service-role connection, idempotent (role + database creation both gated
by existence checks).

Design (v2): the operator PRE-CREATES the Umami DSN Secret
(database.umamiDsnSecretRef) with the final connection string, and this
Job makes the database agree with it — it parses the role password out of
that DSN and creates/alters the role, then creates the database. The
original v1 design generated a password in-job and wrote the Secret back
via kubectl, which failed everywhere real:
  * postgres:16-alpine ships neither kubectl nor curl, and the chart has
    no ServiceAccount/RBAC for Secret writes anyway;
  * the composed DSN used the bare role name, which Supabase's Supavisor
    pooler rejects — pooler usernames must be `role.<tenant-ref>`.
Operator-supplied DSN sidesteps both: whatever host/username format the
environment needs lives in the Secret, and the Job only needs psql.

The DSN's username may be `role` (direct Postgres) or `role.tenant`
(Supavisor) — the Job strips the tenant suffix to get the role to create.
*/}}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "gatewaze-analytics.fullname" . }}-bootstrap-db
  labels:
    {{- include "gatewaze-analytics.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        {{- include "gatewaze-analytics.selectorLabels" . | nindent 8 }}
        component: bootstrap-db
    spec:
      restartPolicy: OnFailure
      containers:
        - name: bootstrap
          image: postgres:16-alpine
          env:
            - name: PLATFORM_DSN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.database.dsnSecretRef.name }}
                  key: {{ .Values.database.dsnSecretRef.key }}
            - name: UMAMI_DSN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.database.umamiDsnSecretRef.name }}
                  key: {{ .Values.database.umamiDsnSecretRef.key }}
            - name: BOOTSTRAP_DATABASE
              value: {{ .Values.database.bootstrapDatabase | quote }}
          command:
            - /bin/sh
            - -ec
            - |
              # Pull role + password out of the operator-supplied DSN.
              # Username may carry a Supavisor tenant suffix (role.tenant);
              # the ROLE to create is the part before the first dot.
              DSN_USER=$(echo "$UMAMI_DSN" | sed -E 's,^postgres(ql)?://([^:@]+).*$,\2,')
              PASSWORD=$(echo "$UMAMI_DSN" | sed -E 's,^postgres(ql)?://[^:]+:([^@]+)@.*$,\2,')
              ROLE=$(echo "$DSN_USER" | cut -d. -f1)
              DSN_DB=$(echo "$UMAMI_DSN" | sed -E 's,^[^@]+@[^/]+/([^?]+).*$,\1,')

              if [ "$DSN_DB" != "$BOOTSTRAP_DATABASE" ]; then
                echo "DSN database ($DSN_DB) != bootstrapDatabase ($BOOTSTRAP_DATABASE)" >&2
                exit 1
              fi

              # Who are we connecting as (for the OWNER grant below)?
              CONNECT_USER=$(echo "$PLATFORM_DSN" | sed -E 's,^postgres(ql)?://([^:@]+).*$,\2,' | cut -d. -f1)

              psql "$PLATFORM_DSN" -v ON_ERROR_STOP=1 <<SQL
                DO \$\$
                BEGIN
                  IF NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = '${ROLE}') THEN
                    EXECUTE format('CREATE ROLE %I LOGIN PASSWORD %L', '${ROLE}', '${PASSWORD}');
                  ELSE
                    EXECUTE format('ALTER ROLE %I LOGIN PASSWORD %L', '${ROLE}', '${PASSWORD}');
                  END IF;
                END
                \$\$;
                GRANT "${ROLE}" TO "${CONNECT_USER}";
              SQL
              psql "$PLATFORM_DSN" -v ON_ERROR_STOP=1 -tAc \
                "SELECT 1 FROM pg_database WHERE datname = '${BOOTSTRAP_DATABASE}'" \
                | grep -q 1 || \
                psql "$PLATFORM_DSN" -v ON_ERROR_STOP=1 \
                  -c "CREATE DATABASE \"${BOOTSTRAP_DATABASE}\" OWNER \"${ROLE}\""
              psql "$PLATFORM_DSN" -v ON_ERROR_STOP=1 \
                -c "GRANT CONNECT, CREATE ON DATABASE \"${BOOTSTRAP_DATABASE}\" TO \"${ROLE}\""

              echo "bootstrap complete: role=${ROLE} database=${BOOTSTRAP_DATABASE}"

{{- /*
Secret holding everything the Server, Worker, and the content-discovery
module (running in core gatewaze-api pod) need at runtime.

The operator wires this Secret into core Gatewaze via the core chart's
`extraEnvFrom`. The Server + Worker Deployments here also reference it
directly.
*/}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "prefect-worker.fullname" . }}-secret
  labels:
    {{- include "prefect-worker.labels" . | nindent 4 }}
type: Opaque
data:
  # --- Core contract: secrets the content-discovery module needs in the
  # gatewaze-api pod via extraEnvFrom ---
  {{- if .Values.webhook.secret }}
  PREFECT_WEBHOOK_SECRET: {{ .Values.webhook.secret | b64enc | quote }}
  {{- end }}

  # --- Prefect Server: metadata DB URL (assembled, never stored raw) ---
  {{- if and .Values.supabase.databaseHost .Values.supabase.databasePassword }}
  PREFECT_API_DATABASE_CONNECTION_URL: {{ include "prefect-worker.databaseUrl" . | b64enc | quote }}
  {{- end }}

  # --- Worker: Supabase data-plane credentials ---
  {{- if .Values.supabase.serviceRoleKey }}
  SUPABASE_SERVICE_ROLE_KEY: {{ .Values.supabase.serviceRoleKey | b64enc | quote }}
  {{- end }}
  {{- if .Values.supabase.agentReaderKey }}
  SUPABASE_AGENT_READER_KEY: {{ .Values.supabase.agentReaderKey | b64enc | quote }}
  {{- end }}
  {{- if .Values.supabase.agentWriterKey }}
  SUPABASE_AGENT_WRITER_KEY: {{ .Values.supabase.agentWriterKey | b64enc | quote }}
  {{- end }}

  # --- Worker: LLM credentials ---
  {{- if .Values.anthropicApiKey }}
  ANTHROPIC_API_KEY: {{ .Values.anthropicApiKey | b64enc | quote }}
  {{- end }}
  {{- if .Values.openaiApiKey }}
  OPENAI_API_KEY: {{ .Values.openaiApiKey | b64enc | quote }}
  {{- end }}

  # --- Worker: third-party data source credentials ---
  {{- if .Values.firecrawl.apiToken }}
  FIRECRAWL_API_TOKEN: {{ .Values.firecrawl.apiToken | b64enc | quote }}
  {{- end }}
  {{- if .Values.githubToken }}
  GITHUB_TOKEN: {{ .Values.githubToken | b64enc | quote }}
  {{- end }}
  {{- if .Values.youtubeApiKey }}
  YOUTUBE_API_KEY: {{ .Values.youtubeApiKey | b64enc | quote }}
  {{- end }}
